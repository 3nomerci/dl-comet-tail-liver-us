[run]
name = "resnet18_baseline"
output_root = "outputs"

[data]
dataset_path = "data/imgNum_919_imgSize_448_03-31_MC.pt"
num_workers = 0
pin_memory = true

[split]
method = "naive"
seed = 53100
train_fraction = 0.70
val_fraction = 0.15
test_fraction = 0.15
stratify = true
save_artifact = true

[data.transform]
random_horizontal_flip_p = 0.0

[model]
name = "resnet18"
num_classes = 2
pretrained = true
dropout = 0.2

[train]
batch_size = 16
epochs = 5
lr = 1e-5
weight_decay = 1e-4
use_amp = true
use_class_weights = true
head_warmup_epochs = 1
head_warmup_lr = 1e-5
head_warmup_weight_decay = 1e-4

[train.scheduler]
name = "none" # supported: none, plateau, cosine
mode = "max" # used by plateau (monitor is val balanced accuracy)
factor = 0.5
patience = 2
min_lr = 1e-7
t_max = 5 # used by cosine
eta_min = 1e-7